<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google-site-verification" content="cbiSu5v2AgMnQu58N-xbp75whHvQlFIksiOEYS1CcXI">
  <meta name="description" content="Shenyi Zhang — Ph.D. Candidate at Wuhan University. Research on adversarial robustness of AI systems, safety alignment and privacy in large language models.">
  <meta property="og:title" content="Shenyi Zhang — Academic Homepage">
  <meta property="og:description" content="Ph.D. Candidate at Wuhan University. Research on adversarial robustness of AI systems, safety alignment and privacy in LLMs.">
  <meta property="og:image" content="https://shenyizg.github.io/images/avatar.png">
  <meta property="og:url" content="https://shenyizg.github.io">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <title>Academic Homepage</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Navigation -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="#" class="nav-logo" id="nav-logo">Loading...</a>
      <div class="nav-links">
        <a href="#about">About</a>
        <a href="#education">Education</a>
        <a href="#publications">Publications</a>
        <a href="#services">Services</a>
        <a href="#teaching">Teaching</a>
        <a href="#talks">Talks</a>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
          <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
          <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
      <button class="nav-menu-btn" id="menuBtn" aria-label="Open menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- Hero / Profile -->
  <header class="hero" id="about">
    <div class="container hero-grid">
      <div class="hero-photo" id="hero-photo"></div>
      <div class="hero-text">
        <h1 id="hero-name"></h1>
        <p class="subtitle" id="hero-title"></p>
        <p class="affiliation" id="hero-affiliation"></p>
        <p class="bio" id="hero-bio"></p>
        <div class="hero-links" id="hero-links"></div>
      </div>
    </div>
  </header>

  <!-- Education -->
  <section class="section section-alt" id="education">
    <div class="container">
      <h2>Education</h2>
      <div id="edu-list"></div>
    </div>
  </section>

  <!-- Publications -->
  <section class="section" id="publications">
    <div class="container">
      <h2>Publications</h2>
      <div id="pub-container"></div>
    </div>
  </section>

  <!-- Services -->
  <section class="section section-alt" id="services">
    <div class="container">
      <h2>Services</h2>
      <div id="services-list"></div>
    </div>
  </section>

  <!-- Teaching -->
  <section class="section" id="teaching">
    <div class="container">
      <h2>Teaching</h2>
      <div class="teaching-list" id="teaching-list"></div>
    </div>
  </section>

  <!-- Talks -->
  <section class="section section-alt" id="talks">
    <div class="container">
      <h2>Talks</h2>
      <div id="talks-list"></div>
    </div>
  </section>

  <!-- Back to top -->
  <button class="back-to-top" id="backToTop" aria-label="Back to top">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 15l-6-6-6 6"/>
    </svg>
  </button>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p id="footer-text"></p>
    </div>
  </footer>

  <!-- Data & Rendering -->
  <script src="data.js"></script>
  <script src="render.js"></script>

  <script>
    // Dark mode toggle
    const toggle = document.getElementById('themeToggle');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const saved = localStorage.getItem('theme');
    if (saved) {
      document.documentElement.setAttribute('data-theme', saved);
    } else if (prefersDark) {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
    toggle.addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    });

    // Mobile menu
    const menuBtn = document.getElementById('menuBtn');
    const navLinks = document.querySelector('.nav-links');
    menuBtn.addEventListener('click', () => {
      navLinks.classList.toggle('open');
      menuBtn.classList.toggle('open');
    });
    navLinks.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        navLinks.classList.remove('open');
        menuBtn.classList.remove('open');
      });
    });

    // Smooth scroll
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener('click', function (e) {
        e.preventDefault();
        const target = document.querySelector(this.getAttribute('href'));
        if (target) {
          target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      });
    });

    // Back to top button
    const backToTop = document.getElementById('backToTop');
    window.addEventListener('scroll', () => {
      backToTop.classList.toggle('visible', window.scrollY > 400);
    });
    backToTop.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // Nav highlight on scroll
    const sections = document.querySelectorAll('header[id], section[id]');
    const navAnchors = document.querySelectorAll('.nav-links a[href^="#"]');
    const observerOpts = { rootMargin: '-20% 0px -75% 0px' };
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          navAnchors.forEach(a => a.classList.remove('active'));
          const active = document.querySelector(`.nav-links a[href="#${entry.target.id}"]`);
          if (active) active.classList.add('active');
        }
      });
    }, observerOpts);
    sections.forEach(s => observer.observe(s));
  </script>
</body>
</html>
